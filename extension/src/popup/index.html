<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Match 简历助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>T-Match</h1>
      <p class="subtitle">简历自动填写助手</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="resume">简历数据</button>
      <button class="tab" data-tab="fill">自动填写</button>
    </div>

    <!-- 简历数据面板 -->
    <div id="panel-resume" class="panel active">
      <div id="resume-status" class="status-card">
        <span class="status-icon">📄</span>
        <span class="status-text">未加载简历</span>
      </div>

      <div class="section">
        <label class="upload-btn" for="file-input">
          <span>📁 上传简历文件</span>
          <small>支持 PDF / Word / JSON / TXT</small>
        </label>
        <input type="file" id="file-input" accept=".json,.txt,.pdf,.docx,.doc" hidden>
      </div>

      <div class="section">
        <h3>或手动填写</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>姓名</label>
            <input type="text" id="input-name" placeholder="张三">
          </div>
          <div class="form-group">
            <label>手机号</label>
            <input type="text" id="input-phone" placeholder="13800138000">
          </div>
          <div class="form-group">
            <label>邮箱</label>
            <input type="text" id="input-email" placeholder="example@mail.com">
          </div>
          <div class="form-group">
            <label>性别</label>
            <input type="text" id="input-gender" placeholder="男/女">
          </div>
          <div class="form-group">
            <label>所在城市</label>
            <input type="text" id="input-location" placeholder="北京">
          </div>
          <div class="form-group">
            <label>求职意向</label>
            <input type="text" id="input-intention" placeholder="前端开发工程师">
          </div>
          <div class="form-group full">
            <label>学校</label>
            <input type="text" id="input-school" placeholder="北京大学">
          </div>
          <div class="form-group">
            <label>学历</label>
            <input type="text" id="input-degree" placeholder="本科">
          </div>
          <div class="form-group">
            <label>专业</label>
            <input type="text" id="input-major" placeholder="计算机科学">
          </div>
          <div class="form-group full">
            <label>个人简介</label>
            <textarea id="input-summary" rows="3" placeholder="简要介绍自己..."></textarea>
          </div>
          <div class="form-group full">
            <label>技能</label>
            <input type="text" id="input-skills" placeholder="JavaScript, Python, React...">
          </div>
        </div>
        <button id="btn-save" class="btn primary">💾 保存简历数据</button>
      </div>
    </div>

    <!-- 自动填写面板 -->
    <div id="panel-fill" class="panel">
      <button id="btn-scan" class="btn secondary full-width">🔍 扫描当前页面表单</button>

      <div id="scan-result" class="scan-result" style="display:none">
        <h3>识别到的字段</h3>
        <div id="field-list"></div>
      </div>

      <button id="btn-fill" class="btn primary full-width" style="display:none">⚡ 一键填写</button>

      <div id="fill-result" style="display:none">
        <h3>填写结果</h3>
        <div id="fill-detail"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.ts"></script>
</body>
</html>
